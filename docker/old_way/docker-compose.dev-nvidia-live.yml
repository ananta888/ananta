# Dev overlay: NVIDIA RTX 3080 (CUDA) primary + Intel Iris Xe (Vulkan/D3D12) fallback.
# Requires NVIDIA Container Toolkit: sudo nvidia-ctk runtime configure --runtime=docker
#
# Usage (full stack):
#   docker compose \
#     -f docker/old_way/docker-compose.base.yml \
#     -f docker/old_way/docker-compose.yml \
#     -f docker/old_way/docker-compose.dev-nvidia-live.yml \
#     up --build
#
# Usage (lighter dev stack):
#   docker compose \
#     -f docker/old_way/docker-compose.base.yml \
#     -f docker/old_way/docker-compose-lite.yml \
#     -f docker/old_way/docker-compose.dev-nvidia-live.yml \
#     up --build

services:
  ollama:
    build:
      context: ../..
      dockerfile: docker/old_way/Dockerfile.ollama-wsl-amd
    image: ollama-wsl-amd:0.20.7-vulkan
    container_name: ollama
    runtime: nvidia
    devices:
      - "/dev/dxg:/dev/dxg"
    environment:
      # NVIDIA CUDA (RTX 3080) — Vulkan disabled to avoid multi-backend split crash
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_VULKAN: "0"
      LD_LIBRARY_PATH: ${OLLAMA_WSL_LD_LIBRARY_PATH:-/usr/lib/wsl/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64}
    volumes:
      - ../../.ollama:/root/.ollama
      - /mnt/c/Users/Public/lm-models:/models:ro
      - /usr/lib/wsl:/usr/lib/wsl:ro

  ai-agent-hub:
    environment:
      FLASK_DEBUG: 0
      OLLAMA_URL: http://ollama:11434/api/generate
    volumes:
      - ../../:/app
      - ../../data/hub:/app/data

  ai-agent-alpha:
    environment:
      FLASK_DEBUG: 0
      OLLAMA_URL: http://ollama:11434/api/generate
    volumes:
      - ../../:/app
      - ../../data/alpha:/app/data

  ai-agent-beta:
    environment:
      FLASK_DEBUG: 0
      OLLAMA_URL: http://ollama:11434/api/generate
    volumes:
      - ../../:/app
      - ../../data/beta:/app/data

  angular-frontend:
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
