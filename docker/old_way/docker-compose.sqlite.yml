# Historisches SQLite-Overlay.
#
# Dieses Overlay ist nicht eigenständig: Die alte Basis definiert Abhängigkeiten
# auf weitere Services. Für neue lokale Installationen stattdessen
# docker/compose-next/compose.quickstart.yml verwenden.

services:
  # Keine zusätzlichen Services wie Postgres/Redis nötig für SQLite Mode
  # Die Basis-Konfiguration nutzt standardmäßig SQLite, wenn DATABASE_URL nicht gesetzt ist.

  ai-agent-hub: {}

  ai-agent-alpha: {}

  ai-agent-beta: {}
