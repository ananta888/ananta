# Lokales E2E-Compose-Overlay: stack laeuft komplett ohne host-port-bindings,
# damit der bestehende compose-next Stack (ports 5000/5001/5002/5432/6379) nicht
# gestoert wird. Nutzt die bereits gebauten ananta-{backend,frontend}-compose-test:local
# Images. Analog zum github-ci.yml aber mit ports: [] durchgaengig.

services:
  postgres:
    extends:
      file: docker-compose-lite.yml
      service: postgres
    ports: []

  redis:
    extends:
      file: docker-compose-lite.yml
      service: redis
    ports: []

  ai-agent-hub:
    extends:
      file: docker-compose.base.yml
      service: ai-agent-hub
    image: ananta-backend-compose-test:local
    ports: []
    depends_on: !reset
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""

  ai-agent-alpha:
    extends:
      file: docker-compose.base.yml
      service: ai-agent-alpha
    image: ananta-backend-compose-test:local
    ports: []
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
      ai-agent-hub:
        condition: service_healthy

  ai-agent-beta:
    extends:
      file: docker-compose.base.yml
      service: ai-agent-beta
    image: ananta-backend-compose-test:local
    ports: []
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
      ai-agent-hub:
        condition: service_healthy

  angular-frontend:
    extends:
      file: docker-compose.base.yml
      service: angular-frontend
    image: ananta-frontend-compose-test:local
    ports: []
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  frontend-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: "admin"
      E2E_ADMIN_PASSWORD: "test123"
      E2E_HUB_AGENT_TOKEN: "hub-token"
      E2E_ALPHA_AGENT_TOKEN: "alpha-token"
      E2E_BETA_AGENT_TOKEN: "beta-token"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Local Seed"
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
    working_dir: /app
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy

volumes:
  postgres_data:
    name: ananta_e2e_local_postgres_data
  redis_data:
    name: ananta_e2e_local_redis_data