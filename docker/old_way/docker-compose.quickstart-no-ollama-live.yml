services:
  # Live-code overlay for quickstart-no-ollama:
  # - Source code is bind-mounted into /app for hub/workers/frontend.
  # - Data is kept in local ./data/* folders for transparent persistence.
  postgres:
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data

  ai-agent-hub:
    environment:
      FLASK_DEBUG: 0
    volumes:
      - ../../:/app
      - ../../data/hub:/app/data
      - ../../project-workspaces:/project-workspaces:rw

  ai-agent-alpha:
    environment:
      FLASK_DEBUG: 0
    ports:
      - "5001:5000"
    volumes:
      - ../../:/app
      - ../../data/alpha:/app/data
      - ../../project-workspaces:/project-workspaces:rw

  ai-agent-beta:
    environment:
      FLASK_DEBUG: 0
    ports:
      - "5002:5000"
    volumes:
      - ../../:/app
      - ../../data/beta:/app/data
      - ../../project-workspaces:/project-workspaces:rw

  angular-frontend:
    volumes:
      - ../../frontend-angular:/app/frontend-angular
      - /app/frontend-angular/node_modules
      - /ms-playwright
