# Vollständiger Live-Teststack — aufgeteilt in ~20 Testservices.
#
# Struktur:
#   Phase 1 (parallel, kein/wenig DB):
#     t-infra, t-llm-cc, t-tui-client, t-tui-operator
#
#   Phase 2 (sequenzielle Kette, flat test_*.py aufgeteilt in 14 Domain-Cluster):
#     t-flat-01 → t-flat-02 → … → t-flat-14
#
#   Phase 3 (nach Kette):
#     t-worker-services, t-e2e-subdir
#
#   Dann: backend-live-llm-test → frontend-unit-test →
#         frontend-e2e-test → frontend-live-llm-test → all-tests
#
# Start:
#   docker compose -f docker/compose-next/compose.tests.lmstudio.yml \
#     --env-file docker/compose-next/.env up --exit-code-from all-tests all-tests
#
# Mit OpenAI-kompatiblem Endpunkt:
#   LIVE_LLM_PROVIDER=openai OPENAI_API_KEY=sk-... \
#   docker compose -f docker/compose-next/compose.tests.lmstudio.yml \
#     --env-file docker/compose-next/.env up --exit-code-from all-tests all-tests

services:

  # ── Basis-Template für alle Backend-Test-Services ────────────────────────────
  # Wird nie direkt gestartet (profiles: [_internal]).
  # Alle t-* und backend-live-llm-test erben via extends: service: _backend-test.

  _backend-test:
    image: ananta-backend-tests:local
    pull_policy: never
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:-ananta_password}@postgres:5432/${POSTGRES_DB:-ananta}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      RAG_REPO_ROOT: "/tmp"
    volumes:
      - ../../:/app
      - test-results:/results
    working_dir: /app
    command: ["true"]

  # ── Infrastruktur ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16.13@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ananta}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ananta_password}"
      POSTGRES_DB: ${POSTGRES_DB:-ananta}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ananta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: []

  redis:
    image: redis:7.4.8-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: []

  # ── Backend-Agenten (für live-llm + e2e) ────────────────────────────────────

  ai-agent-hub:
    build:
      context: ../..
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    restart: unless-stopped
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "alembic upgrade head && exec python -m agent.ai_agent"
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      FLASK_DEBUG: "0"
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-test123}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      DEFAULT_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${LIVE_LLM_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_MODE: ${LMSTUDIO_API_MODE:-chat}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-180}
      COMMAND_TIMEOUT: ${COMMAND_TIMEOUT:-180}
      ANANTA_RUNTIME_PROFILE: ${ANANTA_RUNTIME_PROFILE:-compose-safe}
      SECRET_KEY: ${SECRET_KEY:-ananta-dev-shared-secret-change-me}
      ROLE: hub
      AGENT_NAME: ${ANANTA_HUB_ID:-ananta-hub}
      AGENT_URL: http://ai-agent-hub:5000
      AUTH_TEST_ENDPOINTS_ENABLED: "1"
      HUB_CAN_BE_WORKER: ${HUB_CAN_BE_WORKER:-0}
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:-ananta_password}@postgres:5432/${POSTGRES_DB:-ananta}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_JWKS_CACHE_SECONDS: ${OIDC_JWKS_CACHE_SECONDS:-3600}
      OIDC_ALLOWED_ALGORITHMS: ${OIDC_ALLOWED_ALGORITHMS:-RS256}
    volumes:
      - ../../:/app:rw
      - ../../project-workspaces:/project-workspaces:rw
      - hub-data:/app/data
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health?basic=1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-agent-alpha:
    build:
      context: ../..
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    restart: unless-stopped
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "alembic upgrade head && exec python -m agent.ai_agent"
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      FLASK_DEBUG: "0"
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-test123}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      DEFAULT_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${LIVE_LLM_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_MODE: ${LMSTUDIO_API_MODE:-chat}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-180}
      COMMAND_TIMEOUT: ${COMMAND_TIMEOUT:-180}
      ANANTA_RUNTIME_PROFILE: ${ANANTA_RUNTIME_PROFILE:-compose-safe}
      SECRET_KEY: ${SECRET_KEY:-ananta-dev-shared-secret-change-me}
      ROLE: worker
      AGENT_NAME: ${ANANTA_WORKER_ALPHA_ID:-ananta-worker-1}
      AGENT_URL: http://ai-agent-alpha:5000
      HUB_URL: http://ai-agent-hub:5000
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:-ananta_password}@postgres:5432/${POSTGRES_DB:-ananta}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ../../:/app:rw
      - ../../project-workspaces:/project-workspaces:rw
      - alpha-data:/app/data
    ports: []
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ai-agent-beta:
    build:
      context: ../..
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    restart: unless-stopped
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "alembic upgrade head && exec python -m agent.ai_agent"
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      FLASK_DEBUG: "0"
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-test123}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      DEFAULT_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${LIVE_LLM_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_MODE: ${LMSTUDIO_API_MODE:-chat}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-180}
      COMMAND_TIMEOUT: ${COMMAND_TIMEOUT:-180}
      ANANTA_RUNTIME_PROFILE: ${ANANTA_RUNTIME_PROFILE:-compose-safe}
      SECRET_KEY: ${SECRET_KEY:-ananta-dev-shared-secret-change-me}
      ROLE: worker
      AGENT_NAME: ${ANANTA_WORKER_BETA_ID:-ananta-worker-2}
      AGENT_URL: http://ai-agent-beta:5000
      HUB_URL: http://ai-agent-hub:5000
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:-ananta_password}@postgres:5432/${POSTGRES_DB:-ananta}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ../../:/app:rw
      - ../../project-workspaces:/project-workspaces:rw
      - beta-data:/app/data
    ports: []
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Angular Dev-Server (für Frontend-E2E) ───────────────────────────────────

  angular-frontend:
    build:
      context: ../../frontend-angular
    image: ananta-frontend-tests:local
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npx ng serve --host 0.0.0.0 --port 4200 --poll 2000 --disable-host-check
    environment:
      E2E_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:-test123}"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
    ports: []
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # PHASE 1 — Parallel-Subdirs (kein/wenig DB, starten sofort)
  # ════════════════════════════════════════════════════════════════════════════

  # ~30 Dateien: benchmarks, cli, smoke, heuristic_runtime
  t-infra:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/benchmarks tests/cli tests/smoke tests/heuristic_runtime; echo $? > /results/t-infra; exit 0"]

  # ~37 Dateien: llm_interceptor, codecompass
  t-llm-cc:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/llm_interceptor tests/codecompass; echo $? > /results/t-llm-cc; exit 0"]

  # ~54 Dateien: client_surfaces
  t-tui-client:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/client_surfaces; echo $? > /results/t-tui-client; exit 0"]

  # ~5 Dateien: obsidian-Tests (machen sys.path.insert(0, rag-helper) — eigener Prozess!)
  t-rag-obsidian:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_obsidian_canvas.py tests/test_obsidian_config.py tests/test_obsidian_extractor.py tests/test_obsidian_integration.py tests/test_obsidian_privacy.py tests/test_obsidian_scanner.py; echo $? > /results/t-rag-obsidian; exit 0"]

  # ~53 Dateien: operator_tui
  t-tui-operator:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/operator_tui; echo $? > /results/t-tui-operator; exit 0"]

  # ════════════════════════════════════════════════════════════════════════════
  # PHASE 2 — Sequenzielle Kette: flat test_*.py in 14 Domain-Clustern
  # Jeder Service wartet auf den vorherigen (service_completed_successfully).
  # ════════════════════════════════════════════════════════════════════════════

  # ~96 Dateien: acceptance, action, activation, adapter, admin, adversarial,
  #              agent, ai_snake, alwa, ananta, api, app, approval, architecture,
  #              artifact, ash, audit, auth, auto, autonomous, autopilot, awf
  t-flat-01:
    extends:
      service: _backend-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_a*.py; echo $? > /results/t-flat-01; exit 0"]

  # ~80 Dateien: backend, background, backup, blueprint, browser, budget, build,
  #              caseflow, chat, check, cli (flat), client
  t-flat-02:
    extends:
      service: _backend-test
    depends_on:
      t-flat-01:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_b*.py tests/test_ca*.py tests/test_ch*.py tests/test_cl*.py; echo $? > /results/t-flat-02; exit 0"]

  # ~83 Dateien: codex, codecompass (flat), command, commit, common, compose, config, context, contract, control
  t-flat-03:
    extends:
      service: _backend-test
    depends_on:
      t-flat-02:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_cod*.py tests/test_com*.py tests/test_con*.py; echo $? > /results/t-flat-03; exit 0"]

  # ~48 Dateien: core, creative, critical, cross, csd, csp, custom_tool, cwfh,
  #              db, decision, deerflow, domain
  t-flat-04:
    extends:
      service: _backend-test
    depends_on:
      t-flat-03:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_cor*.py tests/test_cr*.py tests/test_cs*.py tests/test_cu*.py tests/test_cw*.py tests/test_d*.py; echo $? > /results/t-flat-04; exit 0"]

  # ~69 Dateien: endpoint, evolver, execution, explainer, external,
  #              feature, file, freecad, fuzzing, goal
  t-flat-05:
    extends:
      service: _backend-test
    depends_on:
      t-flat-04:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_e*.py tests/test_f*.py tests/test_g*.py; echo $? > /results/t-flat-05; exit 0"]

  # ~49 Dateien: helpcenter, hermes, hub, heuristic (flat)
  t-flat-06:
    extends:
      service: _backend-test
    depends_on:
      t-flat-05:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_h*.py; echo $? > /results/t-flat-06; exit 0"]

  # ~80 Dateien: imap, integration (flat), jwt, knowledge,
  #              llm (flat), login, memory, model, monitoring, multi
  t-flat-07:
    extends:
      service: _backend-test
    depends_on:
      t-flat-06:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_i*.py tests/test_j*.py tests/test_k*.py tests/test_l*.py tests/test_m*.py; echo $? > /results/t-flat-07; exit 0"]

  # ~61 Dateien: namespace, nginx, objective, oidc, opencode, operator (flat),
  #              pattern, permission (Obsidian ausgeschlossen — eigener Service t-rag-obsidian)
  t-flat-08:
    extends:
      service: _backend-test
    depends_on:
      t-flat-07:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_n*.py tests/test_oi*.py tests/test_ol*.py tests/test_ope*.py tests/test_or*.py tests/test_os*.py tests/test_ou*.py tests/test_pa*.py tests/test_pe*.py; echo $? > /results/t-flat-08; exit 0"]

  # ~71 Dateien: plan, planning, plugin, policy, presentation, profiling, propose
  t-flat-09:
    extends:
      service: _backend-test
    depends_on:
      t-flat-08:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_pl*.py tests/test_po*.py tests/test_pr*.py; echo $? > /results/t-flat-09; exit 0"]

  # ~70 Dateien: rag, repair, repository, role, route, run
  t-flat-10:
    extends:
      service: _backend-test
    depends_on:
      t-flat-09:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_r*.py; echo $? > /results/t-flat-10; exit 0"]

  # ~89 Dateien: scheduler, scrum, security, service, settings, skill,
  #              snake, snapshot, spec, sprint, stats
  t-flat-11:
    extends:
      service: _backend-test
    depends_on:
      t-flat-10:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_s*.py; echo $? > /results/t-flat-11; exit 0"]

  # ~60 Dateien: task, template, terminal (test_t[a-k]*)
  t-flat-12:
    extends:
      service: _backend-test
    depends_on:
      t-flat-11:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_t[a-k]*.py; echo $? > /results/t-flat-12; exit 0"]

  # ~92 Dateien: tool, tui (flat), usage, validator, voice (test_t[l-z]* + u + v)
  t-flat-13:
    extends:
      service: _backend-test
    depends_on:
      t-flat-12:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_t[l-z]*.py tests/test_u*.py tests/test_v*.py; echo $? > /results/t-flat-13; exit 0"]

  # ~107 Dateien: wiki, worker (flat), workspace
  t-flat-14:
    extends:
      service: _backend-test
    depends_on:
      t-flat-13:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/test_w*.py; echo $? > /results/t-flat-14; exit 0"]

  # ════════════════════════════════════════════════════════════════════════════
  # PHASE 3 — Nach der Flat-Kette (DB-intensivere Subdirs)
  # ════════════════════════════════════════════════════════════════════════════

  # ~58 Dateien: worker, services
  t-worker-services:
    extends:
      service: _backend-test
    depends_on:
      t-flat-14:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/worker tests/services; echo $? > /results/t-worker-services; exit 0"]

  # ~69 Dateien: e2e, integration, routes — nach ALLEN Backend-Tests
  t-e2e-subdir:
    extends:
      service: _backend-test
    depends_on:
      t-flat-14:
        condition: service_completed_successfully
      t-worker-services:
        condition: service_completed_successfully
      t-infra:
        condition: service_completed_successfully
      t-llm-cc:
        condition: service_completed_successfully
      t-tui-client:
        condition: service_completed_successfully
      t-tui-operator:
        condition: service_completed_successfully
    command: ["sh", "-c", "python -m pytest -q --timeout=60 tests/e2e tests/integration tests/routes --ignore=tests/e2e/fixtures; echo $? > /results/t-e2e-subdir; exit 0"]

  # ════════════════════════════════════════════════════════════════════════════
  # Backend Live-LLM-Test (nach allen Unit-Tests)
  # ════════════════════════════════════════════════════════════════════════════

  backend-live-llm-test:
    extends:
      service: _backend-test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANANTA_QUICKSTART_MODE: "agent-only"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      LIVE_LLM_MODEL: ${LIVE_LLM_MODEL:-auto}
      LIVE_LLM_TIMEOUT_SEC: ${LIVE_LLM_TIMEOUT_SEC:-120}
      LIVE_LLM_RETRY_ATTEMPTS: ${LIVE_LLM_RETRY_ATTEMPTS:-2}
      LIVE_LLM_RETRY_BACKOFF_SEC: ${LIVE_LLM_RETRY_BACKOFF_SEC:-1.0}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_MODE: ${LMSTUDIO_API_MODE:-chat}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:-ananta_password}@postgres:5432/${POSTGRES_DB:-ananta}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      t-e2e-subdir:
        condition: service_completed_successfully
    command: ["python", "-m", "pytest", "-q", "--timeout=120", "tests/test_goal_live_lmstudio.py"]

  # ════════════════════════════════════════════════════════════════════════════
  # Frontend-Tests
  # ════════════════════════════════════════════════════════════════════════════

  frontend-unit-test:
    image: ananta-frontend-tests:local
    pull_policy: never
    working_dir: /app
    environment:
      CI: "true"
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - ../../tests:/tests
      - ../../scripts:/scripts
      - ../../artifacts:/artifacts
    depends_on:
      backend-live-llm-test:
        condition: service_completed_successfully
    command: npm run test:unit

  frontend-e2e-test:
    image: ananta-frontend-tests:local
    pull_policy: never
    working_dir: /app
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:-test123}"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB:-}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA:-}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA:-}"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Seed Scrum Team"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
    depends_on:
      frontend-unit-test:
        condition: service_completed_successfully
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_started
      ai-agent-beta:
        condition: service_started
    command: npm run test:e2e:compose

  frontend-live-llm-test:
    image: ananta-frontend-tests:local
    pull_policy: never
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:-test123}"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB:-}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA:-}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA:-}"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Seed Scrum Team"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      E2E_LIVE_LLM_PROVIDER: ${LIVE_LLM_PROVIDER:-lmstudio}
      LIVE_LLM_MODEL: ${LIVE_LLM_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      E2E_LIVE_LLM_TIMEOUT_MS: ${E2E_LIVE_LLM_TIMEOUT_MS:-300000}
      E2E_LLM_API_TIMEOUT_MS: ${E2E_LLM_API_TIMEOUT_MS:-300000}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ../../frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
    depends_on:
      frontend-e2e-test:
        condition: service_completed_successfully
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_started
      ai-agent-beta:
        condition: service_started
    command: npm run test:e2e:live:compose

  # ── Sentinel ─────────────────────────────────────────────────────────────────
  # Liest /results/<service-name> (jede Datei enthält den pytest Exit-Code).
  # Gibt exit 0 wenn alle 0, sonst exit 1.

  all-tests:
    image: alpine:3.23.4@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    volumes:
      - test-results:/results
    command:
      - sh
      - -c
      - |
        fail=0
        echo "=== Test Results ==="
        for f in /results/*; do
          [ -f "$f" ] || continue
          code=$(cat "$f")
          name=$(basename "$f")
          if [ "$code" = "0" ]; then
            echo "  PASS  $name"
          else
            echo "  FAIL  $name  (exit $code)"
            fail=1
          fi
        done
        echo "===================="
        if [ "$fail" = "0" ]; then
          echo "All backend test groups passed."
          exit 0
        else
          echo "One or more backend test groups FAILED."
          exit 1
        fi
    depends_on:
      frontend-live-llm-test:
        condition: service_completed_successfully
      t-rag-obsidian:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  hub-data:
  alpha-data:
  beta-data:
  test-results:
