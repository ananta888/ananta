services:
  # Ollama bleibt in diesem Quickstart optional und wird nur mit --profile ollama gestartet.
  ollama:
    profiles: ["ollama"]

  autoimport:
    profiles: ["ollama"]

  # Ein auslieferbares Image fuer Hub, Worker und Frontend.
  ai-agent-hub:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_HUB:-agent-only}
      ROLE: hub
      AGENT_NAME: ${ANANTA_HUB_ID:-ananta-hub}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-300}
      DATABASE_URL: ${HUB_DATABASE_URL:-sqlite:////app/data/ananta-hub.db}
      ANANTA_WORKSPACE_ROOT: /project-workspaces
    ports:
      - "5000:5000"
    volumes:
      - hub-data:/app/data
      - ./project-workspaces:/project-workspaces:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health?basic=1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-agent-alpha:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_ALPHA:-agent-only}
      ROLE: worker
      AGENT_NAME: ${ANANTA_WORKER_ALPHA_ID:-ananta-worker-1}
      ANANTA_WORKER_MAX_PARALLEL_TASKS: ${ANANTA_WORKER_MAX_PARALLEL_TASKS:-4}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-300}
      DATABASE_URL: ${ALPHA_DATABASE_URL:-sqlite:////app/data/ananta-alpha.db}
      HUB_URL: http://ai-agent-hub:5000
      AGENT_URL: http://ai-agent-alpha:5000
      ANANTA_WORKSPACE_ROOT: /project-workspaces
    volumes:
      - alpha-data:/app/data
      - ./project-workspaces:/project-workspaces:rw
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  ai-agent-beta:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_BETA:-agent-only}
      ROLE: worker
      AGENT_NAME: ${ANANTA_WORKER_BETA_ID:-ananta-worker-2}
      ANANTA_WORKER_MAX_PARALLEL_TASKS: ${ANANTA_WORKER_MAX_PARALLEL_TASKS:-4}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-300}
      DATABASE_URL: ${BETA_DATABASE_URL:-sqlite:////app/data/ananta-beta.db}
      HUB_URL: http://ai-agent-hub:5000
      AGENT_URL: http://ai-agent-beta:5000
      ANANTA_WORKSPACE_ROOT: /project-workspaces
    volumes:
      - beta-data:/app/data
      - ./project-workspaces:/project-workspaces:rw
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  angular-frontend:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    working_dir: /app/frontend-angular
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_FRONTEND:-role}
      ANANTA_QUICKSTART_ROLE: frontend
      FRONTEND_PORT: ${FRONTEND_PORT:-4200}
      FRONTEND_POLL_MS: ${FRONTEND_POLL_MS:-2000}
    depends_on:
      ai-agent-hub:
        condition: service_healthy

volumes:
  hub-data:
  alpha-data:
  beta-data:
