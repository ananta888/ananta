services:
  # Ollama bleibt in diesem Quickstart optional und wird nur mit --profile ollama gestartet.
  ollama:
    profiles: ["ollama"]

  autoimport:
    profiles: ["ollama"]

  # Ein auslieferbares Image fuer Hub, Worker und Frontend.
  ai-agent-hub:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_HUB:-agent-only}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      DATABASE_URL: ${HUB_DATABASE_URL:-sqlite:////app/data/ananta-hub.db}

  ai-agent-alpha:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_ALPHA:-agent-only}
      ROLE: worker
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      DATABASE_URL: ${ALPHA_DATABASE_URL:-sqlite:////app/data/ananta-alpha.db}
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  ai-agent-beta:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_BETA:-agent-only}
      ROLE: worker
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-lmstudio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-auto}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      OPENAI_URL: ${OPENAI_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      DATABASE_URL: ${BETA_DATABASE_URL:-sqlite:////app/data/ananta-beta.db}
    depends_on:
      ai-agent-hub:
        condition: service_healthy

  angular-frontend:
    image: ${ANANTA_QUICKSTART_IMAGE:-ananta-quickstart-no-ollama:local}
    build:
      context: .
      dockerfile: Dockerfile.quickstart-no-ollama
    working_dir: /app/frontend-angular
    environment:
      ANANTA_QUICKSTART_MODE: ${ANANTA_QUICKSTART_MODE_FRONTEND:-role}
      ANANTA_QUICKSTART_ROLE: frontend
      FRONTEND_PORT: ${FRONTEND_PORT:-4200}
      FRONTEND_POLL_MS: ${FRONTEND_POLL_MS:-2000}
    depends_on:
      ai-agent-hub:
        condition: service_healthy
