apply plugin: 'com.android.application'

def enablePythonRuntime = (project.findProperty('anantaEnablePythonRuntime') ?: 'false').toString().toBoolean()
def anantaPythonVersion = (project.findProperty('anantaPythonVersion') ?: '3.11').toString()
def enableLlamaCppRuntime = (project.findProperty('anantaEnableLlamaCppRuntime') ?: 'false').toString().toBoolean()
def anantaDebugKeystorePath = (project.findProperty('anantaDebugKeystorePath') ?: System.getenv('ANANTA_DEBUG_KEYSTORE_PATH'))?.toString()
def stableDebugKeystoreCandidates = [
    anantaDebugKeystorePath,
    '/mnt/c/Users/pst/.android/debug.keystore',
    "${System.getProperty('user.home')}/.android/debug.keystore",
].findAll { it != null && !it.trim().isEmpty() }
def stableDebugKeystoreFile = stableDebugKeystoreCandidates
    .collect { file(it) }
    .find { it.exists() }

if (enablePythonRuntime) {
    apply plugin: 'com.chaquo.python'
}

android {
    namespace "com.ananta.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    packagingOptions {
        jniLibs {
            // Ensure native libs are unpacked to nativeLibraryDir so proot can be executed directly.
            useLegacyPackaging true
        }
    }
    defaultConfig {
        applicationId "com.ananta.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        if (enablePythonRuntime) {
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        if (enableLlamaCppRuntime) {
            externalNativeBuild {
                cmake {
                    cppFlags "-std=c++17"
                }
            }
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        if (enablePythonRuntime) {
            python {
                version anantaPythonVersion
            }
        }
    }
    signingConfigs {
        if (stableDebugKeystoreFile != null) {
            stableDebug {
                storeFile stableDebugKeystoreFile
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }
    if (enableLlamaCppRuntime) {
        externalNativeBuild {
            cmake {
                path "src/main/cpp/CMakeLists.txt"
            }
        }
    }
    buildTypes {
        debug {
            if (stableDebugKeystoreFile != null) {
                signingConfig signingConfigs.stableDebug
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    if (enablePythonRuntime) {
        sourceSets {
            main {
                python.srcDir 'src/main/python'
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    androidTestImplementation "androidx.test.espresso:espresso-web:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "org.tukaani:xz:1.9"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
