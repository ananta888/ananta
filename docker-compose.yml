# Docker-Compose für Produktiv/Test-Umgebung mit PostgreSQL und Redis
# Basiert auf docker-compose.base.yml
# Nutzung: docker compose -f docker-compose.base.yml -f docker-compose.yml up
# WSL2/Vulkan fuer Ollama optional zusaetzlich: -f docker-compose.ollama-wsl.yml

services:
  postgres:
    image: postgres:16.13@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ananta}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env}"
      POSTGRES_DB: ${POSTGRES_DB:-ananta}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ananta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7.4.8-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  ai-agent-hub:
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-ananta}"
      EVOLVER_ENABLED: ${EVOLVER_ENABLED:-0}
      EVOLVER_BASE_URL: ${EVOLVER_BASE_URL:-http://evolver:8080}
      EVOLVER_ANALYZE_PATH: ${EVOLVER_ANALYZE_PATH:-/evolution/analyze}
      EVOLVER_TIMEOUT_SECONDS: ${EVOLVER_TIMEOUT_SECONDS:-30}
      EVOLVER_DEFAULT: ${EVOLVER_DEFAULT:-0}
      EVOLVER_VERSION: ${EVOLVER_VERSION:-unknown}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  evolver:
    image: ${EVOLVER_IMAGE:-ghcr.io/ananta/evolver:0.7.0}
    restart: unless-stopped
    profiles: ["evolution"]
    environment:
      PYTHONUNBUFFERED: 1
      EVOLVER_HOST: 0.0.0.0
      EVOLVER_PORT: 8080
    ports:
      - "${EVOLVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ai-agent-alpha:
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-ananta}"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy

  ai-agent-beta:
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-ananta}"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.29.4-alpine3.23@sha256:4870c12cd2ca986de501a804b4f506ad3875a0b1874940ba0a2c7f763f1855b2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    profiles: ["edge"]
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot:ro
    depends_on:
      - angular-frontend
      - ai-agent-hub

  loki:
    image: grafana/loki:3.6.10@sha256:f59e6aedfee6af2388d69962b178a35a23152573b4bf0937106746deb7146ec7
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.6.10@sha256:2a0f5e3e160ee5d549c585f6cc4f4e1c566ff783324a424bd75bc16503fc660e
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml

  grafana:
    image: grafana/grafana:12.3.0@sha256:70d9599b186ce287be0d2c5ba9a78acb2e86c1a68c9c41449454d0fc3eeb84e8
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
    environment:
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Error: GRAFANA_PASSWORD must be set in .env}"
    depends_on:
      - loki
      - prometheus

  prometheus:
    image: prom/prometheus:v3.11.2@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  certbot:
    image: certbot/certbot:v5.5.0@sha256:78a7eaa40af657301e25731297b6e73646c695370d17e9bb03189fa82966d65c
    profiles: ["edge"]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    name: ananta_postgres_data
  redis_data:
    name: ananta_redis_data
  prometheus_data:
    name: ananta_prometheus_data
  certbot-etc:
    name: ananta_certbot_etc
  certbot-var:
    name: ananta_certbot_var
  webroot:
    name: ananta_webroot
