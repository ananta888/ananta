# Test-Override fuer die Compose-Welt.
# Nutzung:
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml up -d --build
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml run --rm backend-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml run --rm backend-live-llm-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml run --rm frontend-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml run --rm frontend-live-llm-test

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  ollama:
    ports: !reset []

  ai-agent-hub:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${OLLAMA_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      AUTH_TEST_ENDPOINTS_ENABLED: "1"
    depends_on:
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  ai-agent-alpha:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${OLLAMA_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  ai-agent-beta:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${OLLAMA_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  backend-test:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      PYTHONPATH: "/app"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
      LIVE_LLM_PROVIDER: "ollama"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    command: pytest -q

  backend-live-llm-test:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      PYTHONPATH: "/app"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: "ollama"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      E2E_OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    command: pytest -q tests/test_goal_live_lmstudio.py

  frontend-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy
    command: npm run test:e2e:compose

  frontend-live-llm-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA}"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: "ollama"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
    working_dir: /app
    command: npm run test:e2e:live:compose

  angular-frontend:
    image: ananta-frontend-compose-test:local
    ports: !reset []
