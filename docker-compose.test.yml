# Test-Override fuer die Compose-Welt.
# Nutzung:
# Standard unter WSL2/Vulkan:
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.ollama-wsl.yml -f docker-compose.test.yml up -d --build
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.ollama-wsl.yml -f docker-compose.test.yml run --rm backend-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.ollama-wsl.yml -f docker-compose.test.yml run --rm backend-live-llm-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.ollama-wsl.yml -f docker-compose.test.yml run --rm frontend-test
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.ollama-wsl.yml -f docker-compose.test.yml run --rm frontend-live-llm-test
# Alternative ohne WSL2/Vulkan-Overlay:
# docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.test.yml up -d --build

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  ollama:
    ports: !reset []

  autoimport:
    environment:
      OLLAMA_AUTOIMPORT_MODE: "${OLLAMA_AUTOIMPORT_MODE:-seed}"

  ai-agent-hub:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    volumes:
      - ./:/app
      - ./data/hub:/app/data
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-ananta-default}"
      OPENCODE_DEFAULT_MODEL: "${OPENCODE_DEFAULT_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      ANANTA_OPENCODE_EXECUTION_MODE: "backend"
      AUTH_TEST_ENDPOINTS_ENABLED: "1"
    depends_on:
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  ai-agent-alpha:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    volumes:
      - ./:/app
      - ./data/alpha:/app/data
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-ananta-default}"
      OPENCODE_DEFAULT_MODEL: "${OPENCODE_DEFAULT_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      ANANTA_OPENCODE_EXECUTION_MODE: "backend"
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  ai-agent-beta:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    ports: !reset []
    volumes:
      - ./:/app
      - ./data/beta:/app/data
    environment:
      DEFAULT_PROVIDER: "ollama"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-ananta-default}"
      OPENCODE_DEFAULT_MODEL: "${OPENCODE_DEFAULT_MODEL:-ananta-default}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      ANANTA_OPENCODE_EXECUTION_MODE: "backend"
    depends_on:
      ai-agent-hub:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started

  backend-test:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      PYTHONPATH: "/app"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
      LIVE_LLM_PROVIDER: "ollama"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    command: pytest -q

  backend-live-llm-test:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      PYTHONPATH: "/app"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: "ollama"
      LIVE_LLM_MODEL: "${LIVE_LLM_MODEL:-ananta-default}"
      LIVE_LLM_TIMEOUT_SEC: "${LIVE_LLM_TIMEOUT_SEC:-60}"
      LIVE_LLM_RETRY_ATTEMPTS: "${LIVE_LLM_RETRY_ATTEMPTS:-1}"
      LIVE_LLM_RETRY_BACKOFF_SEC: "${LIVE_LLM_RETRY_BACKOFF_SEC:-0.5}"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      E2E_OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ananta-default}"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    command: pytest -q tests/test_goal_live_lmstudio.py

  frontend-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: "${INITIAL_ADMIN_USER:-admin}"
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?Error: INITIAL_ADMIN_PASSWORD must be set in .env}"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA}"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Seed Scrum Team"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${E2E_OLLAMA_MODEL:-ananta-default}"
      E2E_LIVE_LLM_TIMEOUT_MS: "${E2E_LIVE_LLM_TIMEOUT_MS:-180000}"
      E2E_LLM_API_TIMEOUT_MS: "${E2E_LLM_API_TIMEOUT_MS:-300000}"
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy
    command: npm run test:e2e:compose

  frontend-live-llm-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: "${INITIAL_ADMIN_USER:-admin}"
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?Error: INITIAL_ADMIN_PASSWORD must be set in .env}"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA}"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Seed Scrum Team"
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: "ollama"
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_MODEL: "${E2E_OLLAMA_MODEL:-ananta-default}"
      E2E_LIVE_LLM_TIMEOUT_MS: "${E2E_LIVE_LLM_TIMEOUT_MS:-180000}"
      E2E_LLM_API_TIMEOUT_MS: "${E2E_LLM_API_TIMEOUT_MS:-300000}"
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy
      ollama:
        condition: service_healthy
      autoimport:
        condition: service_started
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
    working_dir: /app
    command: npm run test:e2e:live:compose

  angular-frontend:
    image: ananta-frontend-compose-test:local
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
      - /ms-playwright
    ports: !reset []
