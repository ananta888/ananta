# GitHub Actions overlay for deterministic CI.
# It keeps compose-backed E2E from starting or depending on Ollama in GitHub CI.
services:
  ollama:
    profiles: ["local-llm"]

  autoimport:
    profiles: ["local-llm"]

  angular-frontend:
    image: ananta-frontend-compose-test:local

  ai-agent-hub:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""
    depends_on: !reset
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-agent-alpha:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""
    depends_on: !reset
      postgres:
        condition: service_healthy
      ai-agent-hub:
        condition: service_healthy

  ai-agent-beta:
    image: ananta-backend-compose-test:local
    build:
      context: .
      dockerfile: Dockerfile.compose-test
    environment:
      DEFAULT_PROVIDER: "mock"
      DEFAULT_MODEL: "mock"
      OLLAMA_URL: ""
    depends_on: !reset
      postgres:
        condition: service_healthy
      ai-agent-hub:
        condition: service_healthy

  frontend-test:
    image: ananta-frontend-compose-test:local
    environment:
      CI: "true"
      ANANTA_E2E_USE_EXISTING: "1"
      E2E_REUSE_SERVER: "1"
      E2E_REPORTER_MODE: "compact"
      E2E_FRONTEND_URL: "http://angular-frontend:4200"
      E2E_HUB_URL: "http://ai-agent-hub:5000"
      E2E_ALPHA_URL: "http://ai-agent-alpha:5000"
      E2E_BETA_URL: "http://ai-agent-beta:5000"
      E2E_ADMIN_USER: "${INITIAL_ADMIN_USER:-admin}"
      E2E_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?Error: INITIAL_ADMIN_PASSWORD must be set in .env}"
      E2E_HUB_AGENT_TOKEN: "${AGENT_TOKEN_HUB}"
      E2E_ALPHA_AGENT_TOKEN: "${AGENT_TOKEN_ALPHA}"
      E2E_BETA_AGENT_TOKEN: "${AGENT_TOKEN_BETA}"
      E2E_DETERMINISTIC_SCRUM_SEED: "1"
      E2E_SCRUM_SEED_TEAM_NAME: "E2E Seed Scrum Team"
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      angular-frontend:
        condition: service_started
      ai-agent-hub:
        condition: service_healthy
      ai-agent-alpha:
        condition: service_healthy
      ai-agent-beta:
        condition: service_healthy
    command: npm run test:e2e:compose
