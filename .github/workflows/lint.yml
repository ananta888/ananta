name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli \
            @commitlint/config-conventional

      - name: Lint commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha || 'HEAD~1' }} \
            --to HEAD \
            --verbose

      - name: Secret scan (basic patterns)
        run: |
          if rg -n --hidden --glob '!.git' --glob '!scripts/dyndns.conf' \
            '(password=|token=|api[_-]?key=|secret=|authorization: ?bearer )' \
            scripts agent config docs; then
            echo "Potential plaintext secret pattern detected."
            exit 1
          fi
