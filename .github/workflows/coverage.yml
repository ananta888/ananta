name: Coverage Report

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 6"
  pull_request:
    types: [labeled]

permissions:
  contents: read
  actions: read

jobs:
  resolve_backend_coverage:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Resolve backend coverage shards
        id: resolve
        run: |
          set -euo pipefail
          python scripts/resolve_backend_coverage_shards.py --shard-count 4 > backend-coverage-matrix.json
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat backend-coverage-matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  backend-coverage:
    needs: resolve_backend_coverage
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.resolve_backend_coverage.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Load shard selection
        id: shard
        env:
          TEST_FILES_JSON: ${{ toJson(matrix.files) }}
          SHARD_FILE_COUNT: ${{ matrix.file_count }}
          SHARD_TEST_COUNT: ${{ matrix.test_count }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          files = json.loads(os.environ["TEST_FILES_JSON"])
          if not files:
            sys.stderr.write("No backend test files were assigned to this shard.\n")
            sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write("files<<EOF\n")
            handle.write("\n".join(files))
            handle.write("\nEOF\n")
            handle.write(f"test_count={os.environ['SHARD_TEST_COUNT']}\n")
            handle.write(f"file_count={os.environ['SHARD_FILE_COUNT']}\n")
          print(
              f"Loaded shard with {os.environ['SHARD_FILE_COUNT']} files "
              f"and {os.environ['SHARD_TEST_COUNT']} collected tests"
          )
          PY
      - name: Run backend coverage
        env:
          COVERAGE_FILE: .coverage.${{ matrix.shard_index }}
        run: |
          set -euo pipefail
          mapfile -t test_files <<< "${{ steps.shard.outputs.files }}"
          if [[ "${#test_files[@]}" -eq 0 ]]; then
            echo "No backend test files were assigned to this shard." >&2
            exit 1
          fi
          pytest "${test_files[@]}" --cov=agent --cov-report=
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-backend-coverage-${{ matrix.shard_index }}
          path: .coverage.${{ matrix.shard_index }}
          retention-days: 7

  frontend-coverage:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - run: npm ci
      - name: Run frontend unit coverage
        run: npm run test:unit -- --coverage
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-frontend-coverage
          path: frontend-angular/coverage/**
          retention-days: 7

  coverage-summary:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    needs: [backend-coverage, frontend-coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install coverage tooling
        run: python -m pip install --upgrade pip coverage
      - name: Download backend coverage artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import io
          import json
          import os
          import pathlib
          import urllib.request
          import zipfile

          repo = os.environ["GH_REPOSITORY"]
          run_id = os.environ["GH_RUN_ID"]
          token = os.environ["GITHUB_TOKEN"]
          out_dir = pathlib.Path("coverage-artifacts")
          out_dir.mkdir(parents=True, exist_ok=True)

          def request_json(url: str):
            req = urllib.request.Request(
              url,
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req) as response:
              return json.load(response)

          artifacts = request_json(
            f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100"
          ).get("artifacts", [])
          selected = [a for a in artifacts if str(a.get("name", "")).startswith("ananta-backend-coverage-")]
          if not selected:
            raise SystemExit("No backend coverage artifacts found for this run.")

          for artifact in selected:
            req = urllib.request.Request(
              artifact["archive_download_url"],
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req) as response:
              payload = response.read()
            target_dir = out_dir / artifact["name"]
            target_dir.mkdir(parents=True, exist_ok=True)
            with zipfile.ZipFile(io.BytesIO(payload)) as archive:
              archive.extractall(target_dir)
            print(f"Downloaded {artifact['name']}")
          PY
      - name: Combine backend coverage data
        run: |
          set -euo pipefail
          mapfile -t coverage_files < <(find coverage-artifacts -name '.coverage*' -type f | sort)
          if [[ "${#coverage_files[@]}" -eq 0 ]]; then
            echo "No backend coverage data files were downloaded." >&2
            exit 1
          fi
          coverage combine "${coverage_files[@]}"
          coverage xml -o coverage.xml
      - name: Validate backend coverage thresholds
        run: python devtools/check_backend_coverage_thresholds.py --coverage-xml coverage.xml --thresholds devtools/coverage-thresholds.backend.json
      - name: Upload combined backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-backend-coverage
          path: coverage.xml
          retention-days: 7
      - name: Coverage summary
        run: echo "Coverage artifacts generated for backend and frontend."
