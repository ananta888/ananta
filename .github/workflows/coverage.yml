name: Coverage Report

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 6"
  pull_request:
    types: [labeled]

permissions:
  contents: read
  actions: read

jobs:
  resolve_backend_coverage:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Resolve backend coverage shards
        id: resolve
        run: |
          set -euo pipefail
          python scripts/resolve_backend_coverage_shards.py --shard-count 14 > backend-coverage-matrix.json
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          cat backend-coverage-matrix.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  backend-coverage:
    needs: resolve_backend_coverage
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: backend-coverage (${{ matrix.shard_name }})
    strategy:
      fail-fast: false
      max-parallel: 14
      matrix: ${{ fromJson(needs.resolve_backend_coverage.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Load shard selection
        id: shard
        env:
          TEST_FILES_JSON: ${{ toJson(matrix.files) }}
          SHARD_NAME: ${{ matrix.shard_name }}
          SHARD_FILE_COUNT: ${{ matrix.file_count }}
          SHARD_TEST_COUNT: ${{ matrix.test_count }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          files = json.loads(os.environ["TEST_FILES_JSON"])
          if not files:
            sys.stderr.write("No backend test files were assigned to this shard.\n")
            sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write("files<<EOF\n")
            handle.write("\n".join(files))
            handle.write("\nEOF\n")
            handle.write(f"test_count={os.environ['SHARD_TEST_COUNT']}\n")
            handle.write(f"file_count={os.environ['SHARD_FILE_COUNT']}\n")
            handle.write(f"shard_name={os.environ['SHARD_NAME']}\n")
          print(
              f"Loaded shard {os.environ['SHARD_NAME']} with {os.environ['SHARD_FILE_COUNT']} files "
              f"and {os.environ['SHARD_TEST_COUNT']} collected tests"
          )
          PY
      - name: Run backend coverage
        env:
          TEST_FILES_JSON: ${{ toJson(matrix.files) }}
          SHARD_NAME: ${{ matrix.shard_name }}
        run: |
          python - <<'PY'
          import json, os, subprocess, sys

          shard = os.environ["SHARD_NAME"].strip()
          cwd = os.getcwd()
          data_file = os.path.join(cwd, f"backend-coverage-{shard}")

          print(f"[dbg] shard={repr(shard)}")
          print(f"[dbg] cwd={cwd}")
          print(f"[dbg] data_file={data_file}")
          print(f"[dbg] python={sys.executable}")

          files = json.loads(os.environ["TEST_FILES_JSON"])
          print(f"[dbg] files={len(files)} first={files[:2] if files else []}")

          if not files:
              sys.stderr.write(f"::error::Shard {shard} has no test files.\n")
              sys.exit(1)

          result = subprocess.run(
              [sys.executable, "-m", "coverage", "run",
               f"--data-file={data_file}", "--source=agent",
               "-m", "pytest", "-p", "no:cov"] + files,
              check=False,
          )

          print(f"[dbg] pytest exit={result.returncode}")
          coverage_files = [f for f in os.listdir(cwd) if "backend-coverage" in f or ".coverage" in f]
          print(f"[dbg] coverage files in cwd: {coverage_files}")
          print(f"[dbg] data_file exists: {os.path.exists(data_file)}")

          if not os.path.exists(data_file):
              sys.stderr.write(
                  f"::error::Coverage file {data_file} was not written "
                  f"(pytest exit={result.returncode}, found={coverage_files}).\n"
              )
              sys.exit(1)

          sys.exit(result.returncode)
          PY
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-backend-coverage-${{ matrix.shard_name }}
          path: backend-coverage-${{ matrix.shard_name }}
          retention-days: 7
          if-no-files-found: error

  frontend-coverage:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - run: npm ci
      - name: Run frontend unit coverage
        run: npm run test:unit -- --coverage
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-frontend-coverage
          path: frontend-angular/coverage/**
          retention-days: 7

  coverage-summary:
    if: github.event_name != 'pull_request' || github.event.label.name == 'coverage'
    needs: [backend-coverage, frontend-coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install coverage tooling
        run: python -m pip install --upgrade pip coverage
      - name: Download backend coverage artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ github.run_id }}" \
            --dir coverage-artifacts \
            --pattern "ananta-backend-coverage-*"
          echo "Downloaded artifacts:"
          find coverage-artifacts -type f | sort
      - name: Combine backend coverage data
        run: |
          set -euo pipefail
          mapfile -t coverage_files < <(find coverage-artifacts -name 'backend-coverage-*' -type f | sort)
          if [[ "${#coverage_files[@]}" -eq 0 ]]; then
            echo "No backend coverage data files were downloaded." >&2
            exit 1
          fi
          coverage combine "${coverage_files[@]}"
          coverage xml -o coverage.xml
      - name: Validate backend coverage thresholds
        run: python devtools/check_backend_coverage_thresholds.py --coverage-xml coverage.xml --thresholds devtools/coverage-thresholds.backend.json
      - name: Upload combined backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-backend-coverage
          path: coverage.xml
          retention-days: 7
      - name: Coverage summary
        run: echo "Coverage artifacts generated for backend and frontend."
