name: Update README Release Reference

on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Update README release block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme_release.py

      - name: Commit README update
        run: |
          if git diff --quiet README.md; then
            echo "README.md release block already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README release reference"
          git push
