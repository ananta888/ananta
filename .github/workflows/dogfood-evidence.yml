name: Dogfood Evidence E2E

on:
  workflow_dispatch:
    inputs:
      browsers:
        description: "Comma-separated Playwright browsers"
        required: false
        default: "chromium"
      test_grep:
        description: "Optional Playwright grep filter"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: dogfood-evidence-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dogfood-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_BROWSERS: ${{ inputs.browsers }}
      E2E_REPORTER_MODE: compact
      E2E_TEST_TIMEOUT_MS: "90000"
      E2E_EXPECT_TIMEOUT_MS: "20000"
      E2E_WEBSERVER_TIMEOUT_MS: "150000"
      E2E_SERVICE_HEALTH_TIMEOUT_MS: "150000"
      ANANTA_E2E_FORCE_ISOLATED: "1"
      ANANTA_E2E_INSTALL_DEPS: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: "npm"
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Install frontend deps
        working-directory: frontend-angular
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend-angular
        run: npx playwright install --with-deps chromium
      - name: Run dogfood E2E with retained evidence
        working-directory: frontend-angular
        run: |
          if [ -n "${{ inputs.test_grep }}" ]; then
            npx playwright test --grep "${{ inputs.test_grep }}" --screenshot=on --video=on --trace=on
          else
            npx playwright test --screenshot=on --video=on --trace=on
          fi
      - name: Upload dogfood evidence artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-dogfood-e2e-evidence
          path: |
            frontend-angular/test-results/**
            frontend-angular/playwright-report/**
          if-no-files-found: warn
          retention-days: 14
