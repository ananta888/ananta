name: Daemon Worker Runtime Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daemon-worker-runtime-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      EVIDENCE_TOKEN: evidence-agent-token-with-sufficient-length-1234567890
      HUB_URL: http://127.0.0.1:5862
      OPENCODE_DISABLE_AUTOUPDATE: "1"
      OPENCODE_DISABLE_PRUNE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          npm install -g opencode-ai
          opencode --version
      - name: Start local evidence hub
        run: |
          mkdir -p ci-artifacts/daemon-worker-runtime-evidence/hub-data
          DATABASE_URL=sqlite:///ci-artifacts/daemon-worker-runtime-evidence/hub-data/hub.db \
          python scripts/evidence_hub_server.py \
            --host 127.0.0.1 \
            --port 5862 \
            --data-dir ci-artifacts/daemon-worker-runtime-evidence/hub-data \
            --token "$EVIDENCE_TOKEN" \
            > ci-artifacts/daemon-worker-runtime-evidence/hub.log 2>&1 &
          echo $! > ci-artifacts/daemon-worker-runtime-evidence/hub.pid
      - name: Run daemon worker runtime evidence setup and workers
        run: |
          python scripts/run_real_worker_runtime_evidence.py \
            --out ci-artifacts/daemon-worker-runtime-evidence \
            --require-opencode
      - name: Upload daemon worker runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-daemon-worker-runtime-evidence
          path: ci-artifacts/daemon-worker-runtime-evidence/**
          if-no-files-found: warn
          retention-days: 14
