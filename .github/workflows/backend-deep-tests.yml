name: Backend Deep Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: backend-deep-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-standard-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock

      - name: Run backend standard checks
        run: python scripts/check_pipeline.py --mode standard --skip-style --skip-types

  backend-deep-tests:
    runs-on: ubuntu-latest
    needs: backend-standard-checks
    timeout-minutes: 50
    env:
      AUTH_TEST_ENDPOINTS_ENABLED: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── operator_tui ────────────────────────────────────────────────────
          - shard: operator-tui-core
            paths: >-
              tests/operator_tui/test_chat_transport_share_session.py
              tests/operator_tui/test_device_keys.py
              tests/operator_tui/test_oidc_device_flow.py
              tests/operator_tui/test_semantic_overlay.py
              tests/operator_tui/test_share_*.py
              tests/operator_tui/test_shared_viewer.py
              tests/operator_tui/test_tui_delta_hashing.py

          - shard: operator-tui-chat-control
            paths: tests/operator_tui/chat_control/test_*.py

          - shard: operator-tui-chat-memory
            paths: tests/operator_tui/chat_memory/test_*.py

          - shard: operator-tui-config-scroll
            paths: >-
              tests/operator_tui/config/test_*.py
              tests/operator_tui/scroll/test_*.py

          - shard: operator-tui-visual
            paths: >-
              tests/operator_tui/visual/markdown/test_*.py
              tests/operator_tui/visual/test_*.py

          # ── client_surfaces/operator_tui ───────────────────────────────────
          - shard: client-core-ai
            paths: tests/client_surfaces/operator_tui/test_ai_snake_*.py

          - shard: client-core-ui
            paths: >-
              tests/client_surfaces/operator_tui/test_artifact_*.py
              tests/client_surfaces/operator_tui/test_chat_state_prediction_comments.py
              tests/client_surfaces/operator_tui/test_center_browser_commands.py
              tests/client_surfaces/operator_tui/test_doc_open_command.py
              tests/client_surfaces/operator_tui/test_external_window_*.py
              tests/client_surfaces/operator_tui/test_mouse_*.py
              tests/client_surfaces/operator_tui/test_region_hit_map.py
              tests/client_surfaces/operator_tui/test_terminal.py

          - shard: client-auth
            paths: tests/client_surfaces/operator_tui/auth/test_*.py

          - shard: client-realtime
            paths: tests/client_surfaces/operator_tui/realtime/test_*.py

          - shard: client-visual
            paths: >-
              tests/client_surfaces/operator_tui/visual/browser/test_*.py
              tests/client_surfaces/operator_tui/visual/test_*.py

          # ── heuristic_runtime / llm_interceptor ───────────────────────────
          - shard: heuristic-core
            paths: >-
              tests/heuristic_runtime/test_heuristic_*.py
              tests/heuristic_runtime/test_shadow_experiment_runner.py
              tests/heuristic_runtime/test_no_llm_in_fast_path.py
              tests/heuristic_runtime/test_auto_experimental_leases.py
              tests/heuristic_runtime/test_heuristic_registry_experimental_live.py

          - shard: heuristic-dsl
            paths: >-
              tests/heuristic_runtime/test_dsl_*.py
              tests/heuristic_runtime/test_decision_*.py
              tests/heuristic_runtime/test_motion_planner.py
              tests/heuristic_runtime/test_tui_observation_buffer.py
              tests/heuristic_runtime/test_llm_heuristic_parser.py

          - shard: llm-routing
            paths: >-
              tests/llm_interceptor/test_model_profiles.py
              tests/llm_interceptor/test_policy_profiles.py
              tests/llm_interceptor/test_provider_router.py
              tests/llm_interceptor/test_provider_routing_rules.py
              tests/llm_interceptor/test_prompt_adapter.py
              tests/llm_interceptor/test_context_gate.py
              tests/llm_interceptor/test_opencode_compat.py

          - shard: llm-streaming
            paths: >-
              tests/llm_interceptor/test_streaming.py
              tests/llm_interceptor/test_streaming_validation.py
              tests/llm_interceptor/test_request_envelope.py
              tests/llm_interceptor/test_response_validator.py
              tests/llm_interceptor/test_fail_closed.py
              tests/llm_interceptor/test_e2e_fake_upstream.py

          - shard: llm-security
            paths: >-
              tests/llm_interceptor/test_secret_redactor.py
              tests/llm_interceptor/test_audit_logger.py
              tests/llm_interceptor/test_config_schema.py
              tests/llm_interceptor/test_security_regression_corpus.py
              tests/llm_interceptor/test_cli_startup.py
              tests/llm_interceptor/test_policy_engine.py
              tests/llm_interceptor/test_repair_controller.py

          # ── e2e ────────────────────────────────────────────────────────────
          - shard: e2e-autopilot-new-project
            paths: >-
              tests/e2e/test_autopilot_new_project_api_smoke.py
              tests/e2e/test_autopilot_new_project_llm_first.py
              tests/e2e/test_autopilot_new_project_fibonacci.py
              tests/e2e/test_autopilot_new_project_fibonacci_full_flow.py

          - shard: e2e-autopilot-flows
            paths: >-
              tests/e2e/test_autopilot_full_flow_failure_modes.py
              tests/e2e/test_autopilot_taskscoped_persist_execute_and_verified_completion.py
              tests/e2e/test_autopilot_verification_service_full_flow.py

          - shard: e2e-planning-learning
            paths: >-
              tests/e2e/test_planning_learning_loop.py
              tests/e2e/test_parallel_scenario_goal_scoped_config.py
              tests/e2e/test_llm_assisted_project_creation.py

          - shard: e2e-tui
            paths: >-
              tests/e2e/test_tui_*.py
              tests/e2e/test_shared_tui_view.py
              tests/e2e/test_cli_golden_path_snapshots.py
              tests/e2e/test_scripted_smoke.py
              tests/e2e/test_web_ui_screenshots.py
              tests/e2e/test_optional_video_capture.py

          - shard: e2e-worker
            paths: >-
              tests/e2e/worker/test_*.py
              tests/e2e/test_command_chain_execution_full_flow.py
              tests/e2e/test_controlled_loop_flow.py
              tests/e2e/test_standalone_worker_flow.py
              tests/e2e/test_parallel_worker_ollama_saturation.py

          - shard: e2e-rag-runtime
            paths: >-
              tests/e2e/test_browser_use_mock_e2e.py
              tests/e2e/test_wiki_rag_fixture_flow.py
              tests/e2e/test_rag_dogfood_tiny_repo.py
              tests/e2e/test_bitcoin_mining_citation_evidence.py
              tests/e2e/test_freecad_runtime_golden_path.py
              tests/e2e/test_blender_runtime_golden_path.py
              tests/e2e/test_core_golden_path.py
              tests/e2e/test_e2e_report_generation.py
              tests/e2e/test_experimental_live_rollback.py
              tests/e2e/test_workspace_git_sync_flow.py
              tests/e2e/test_ai_timeout_fallback.py

          # ── worker / smoke / cli / benchmarks ─────────────────────────────
          - shard: worker-planning
            paths: >-
              tests/worker/test_planner_*.py
              tests/worker/test_command_planner.py
              tests/worker/test_patch_planner.py
              tests/worker/test_retrieval_indexing.py
              tests/worker/test_retrieval_ranking.py
              tests/worker/test_rag_file_selection.py
              tests/worker/test_chunking_strategy.py
              tests/worker/test_planner_step_graph.py
              tests/worker/test_planner_state_machine.py
              tests/worker/test_planner_replan.py
              tests/worker/test_planner_scheduler.py
              tests/worker/test_planner_checkpoint_resume.py
              tests/worker/test_planner_observability.py

          - shard: worker-adapters
            paths: >-
              tests/worker/test_*_adapter_contract.py
              tests/worker/test_experimental_coding_adapters.py
              tests/worker/test_worker_model_provider.py
              tests/worker/test_native_patch_proposer.py
              tests/worker/test_shellgpt_adapter_contract.py
              tests/worker/test_aider_adapter_contract.py
              tests/worker/test_worker_contract_schemas.py

          - shard: worker-gates
            paths: >-
              tests/worker/test_command_execution_approval.py
              tests/worker/test_patch_apply_approval.py
              tests/worker/test_shell_command_policy.py
              tests/worker/test_worker_verification.py
              tests/worker/test_worker_redaction.py

          - shard: worker-runtime
            paths: >-
              tests/worker/test_worker_degradation.py
              tests/worker/test_worktree_sandbox.py
              tests/worker/test_coding_prompt_assembly.py
              tests/worker/test_worker_trace_metadata.py
              tests/worker/test_patch_failure_handling.py
              tests/worker/test_semantic_output_correction.py
              tests/worker/test_no_llm_coding_fallback.py
              tests/worker/test_controlled_worker_loop.py
              tests/worker/test_standalone_runtime.py

          - shard: smoke-cli
            paths: >-
              tests/smoke/test_*.py
              tests/cli/test_*.py

          - shard: benchmarks
            paths: >-
              tests/benchmarks/codecompass_worker/test_*.py
              tests/benchmarks/retrieval/test_*.py
              tests/benchmarks/wiki_rag/test_*.py

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install pytest-timeout

      - name: Run deep tests – ${{ matrix.shard }}
        run: |
          python -m pytest ${{ matrix.paths }} \
            -vv \
            --durations=25 \
            --timeout=180 \
            -m "not live_compose" \
            -k "not test_task_evolution_apply_endpoint_is_explicitly_policy_gated \
                and not test_task_evolution_validate_and_apply_fail_closed_for_analyze_only_evolver \
                and not test_llm_generate_runtime_falls_back_to_ollama_in_routing_metadata \
                and not test_task_execute_auto_records_llm_benchmark \
                and not test_task_propose_accepts_stderr_json_as_fallback_output \
                and not test_task_propose_extracts_embedded_json_after_traceback_output \
                and not test_task_propose_repairs_invalid_output_with_followup_prompt \
                and not test_task_propose_repairs_invalid_output_after_opencode_failure \
                and not test_task_propose_uses_worker_execution_context_and_allowed_tools \
                and not test_task_propose_passes_temperature_to_cli_and_exposes_routing_field \
                and not test_task_propose_reuses_stateful_cli_session_when_enabled \
                and not test_task_propose_creates_live_terminal_session_metadata_when_enabled \
                and not test_task_propose_creates_interactive_terminal_session_metadata_when_enabled \
                and not test_task_propose_interactive_terminal_retries_timeout_with_compact_context_and_returns_error \
                and not test_health_endpoint_marks_lmstudio_unstable_when_reachable_without_models" \
            --ignore-glob=tests/**/fixtures/** \
            --ignore=tests/test_autonomous_flow_e2e.py \
            --ignore=tests/test_autonomous_scrum_e2e.py \
            --ignore=tests/test_autopilot_integration.py \
            --ignore=tests/test_deerflow_integration.py \
            --ignore=tests/test_e2e_auth.py \
            --ignore=tests/test_evolver_live_compose.py \
            --ignore=tests/test_hybrid_orchestrator_load.py \
            --ignore=tests/test_tasks_opencode_e2e.py \
            --ignore=tests/test_triggers_e2e.py \
            --ignore=tests/test_worker_client_adapter.py
