name: Backend Deep Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: backend-deep-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-standard-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock

      - name: Run backend standard checks
        run: python scripts/check_pipeline.py --mode standard --skip-style --skip-types

  backend-deep-tests:
    runs-on: ubuntu-latest
    needs: backend-standard-checks
    timeout-minutes: 50
    env:
      AUTH_TEST_ENDPOINTS_ENABLED: "true"

    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11.15"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install pytest-split pytest-timeout

      - name: Run backend deep tests shard ${{ matrix.group }}
        run: |
          python -m pytest tests \
            -vv \
            --durations=25 \
            --timeout=180 \
            --splits 6 \
            --group ${{ matrix.group }} \
            -m "not live_compose" \
            -k "not test_task_evolution_apply_endpoint_is_explicitly_policy_gated and not test_task_evolution_validate_and_apply_fail_closed_for_analyze_only_evolver and not test_llm_generate_runtime_falls_back_to_ollama_in_routing_metadata" \
            --ignore-glob=tests/**/fixtures/** \
            --ignore=tests/test_autonomous_flow_e2e.py \
            --ignore=tests/test_autonomous_scrum_e2e.py \
            --ignore=tests/test_autopilot_integration.py \
            --ignore=tests/test_deerflow_integration.py \
            --ignore=tests/test_e2e_auth.py \
            --ignore=tests/test_evolver_live_compose.py \
            --ignore=tests/test_hybrid_orchestrator_load.py \
            --ignore=tests/test_tasks_opencode_e2e.py \
            --ignore=tests/test_triggers_e2e.py
