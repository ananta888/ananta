name: Core Evidence Flow

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

concurrency:
  group: core-evidence-flow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  core-evidence-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:///:memory:
      CONTROLLER_URL: http://mock-controller
      AGENT_NAME: evidence-agent
      INITIAL_ADMIN_USER: admin
      INITIAL_ADMIN_PASSWORD: admin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend and rag-helper deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run core evidence flow
        run: python scripts/run_core_evidence_flow.py --out ci-artifacts/core-evidence-flow
      - name: Print evidence summary
        if: always()
        run: |
          if [ -f ci-artifacts/core-evidence-flow/evidence-summary.json ]; then
            cat ci-artifacts/core-evidence-flow/evidence-summary.json
          fi
      - name: Upload core evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-core-evidence-flow
          path: ci-artifacts/core-evidence-flow/**
          if-no-files-found: error
          retention-days: 14
