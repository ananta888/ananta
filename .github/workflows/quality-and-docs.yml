name: Quality And Docs

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run backend smoke regression set
        run: >
          pytest -q
          tests/test_system_health_standard.py
          tests/test_task_state_machine_service.py
          tests/test_agent_endpoints.py::test_contract_catalog_exposes_core_json_schemas
          tests/test_verification_governance.py::TestVerificationGovernance::test_goal_governance_summary_aggregates_policy_and_verification

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-angular/package-lock.json
      - run: npm ci
      - run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test-postgres-password
      INITIAL_ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
      AGENT_TOKEN_HUB: hub-token
      AGENT_TOKEN_ALPHA: alpha-token
      AGENT_TOKEN_BETA: beta-token
      AGENT_TOKEN_GAMMA: gamma-token
      AGENT_TOKEN_DELTA: delta-token
    steps:
      - uses: actions/checkout@v4
      - name: Validate lite compose config
        run: docker compose -f docker-compose.base.yml -f docker-compose-lite.yml config >/tmp/compose-lite.out
      - name: Validate distributed compose config
        run: docker compose -f docker-compose.base.yml -f docker-compose.yml -f docker-compose.distributed.yml config >/tmp/compose-distributed.out

  e2e-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend-angular
      - name: Start compose stack
        run: docker compose -f docker-compose.base.yml -f docker-compose-lite.yml up -d --build
      - name: Run E2E against compose
        id: e2e
        continue-on-error: true
        run: npm run test:e2e:compose
        working-directory: frontend-angular
      - name: Build failure summary
        if: always()
        run: node scripts/e2e-failure-summary.js
        working-directory: frontend-angular
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-results
          path: |
            frontend-angular/test-results/junit-results.xml
            frontend-angular/test-results/results.json
            frontend-angular/test-results/failure-summary.md
      - name: Stop compose stack
        if: always()
        run: docker compose -f docker-compose.base.yml -f docker-compose-lite.yml down -v --remove-orphans
      - name: Fail workflow on E2E failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  todo-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: python devtools/sync_todo_stats.py
      - run: python devtools/validate_todo_schema.py
      - run: git diff --exit-code todo_last.json

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python devtools/check_markdown_links.py

  architecture-diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @mermaid-js/mermaid-cli
      - run: mkdir -p architektur/rendered
      - run: |
          for f in architektur/uml/*.mmd; do
            out="architektur/rendered/$(basename "${f%.mmd}.png")"
            mmdc -i "$f" -o "$out" -b transparent
          done
      - uses: actions/upload-artifact@v4
        with:
          name: architecture-diagrams
          path: architektur/rendered/*.png
