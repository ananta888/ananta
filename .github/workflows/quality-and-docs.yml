name: Quality And Docs

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-and-docs-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run unified check pipeline (standard mode)
        run: python scripts/check_pipeline.py --mode standard --skip-style --skip-types

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run backend smoke regression set
        run: >
          pytest -q
          tests/test_system_health_standard.py
          tests/test_task_state_machine_service.py
          tests/test_agent_endpoints.py::test_contract_catalog_exposes_core_json_schemas
          tests/test_verification_governance.py::TestVerificationGovernance::test_goal_governance_summary_aggregates_policy_and_verification

  eclipse-runtime-headless:
    runs-on: ubuntu-latest
    env:
      ANANTA_DOCKER_CLEAN_PATH: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run Eclipse runtime headless smoke gate
        run: python3 scripts/smoke_eclipse_runtime_headless.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: "npm"
          cache-dependency-path: frontend-angular/package-lock.json
      - run: npm ci
      - run: npm run build

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_surfaces/vscode_extension
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: "npm"
          cache-dependency-path: client_surfaces/vscode_extension/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run test:smoke
      - run: npm run compile
      - run: npm run package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-vscode-extension-vsix
          path: client_surfaces/vscode_extension/dist/ananta-vscode-extension.vsix
          retention-days: 7

  compose-config:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test-postgres-password
      INITIAL_ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
      AGENT_TOKEN_HUB: hub-token
      AGENT_TOKEN_ALPHA: alpha-token
      AGENT_TOKEN_BETA: beta-token
      AGENT_TOKEN_GAMMA: gamma-token
      AGENT_TOKEN_DELTA: delta-token
      GRAFANA_PASSWORD: test-grafana-password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Prepare compose artifact directory
        run: mkdir -p ci-artifacts/compose
      - name: Validate lite compose config
        run: docker compose -f docker-compose.base.yml -f docker-compose-lite.yml config > ci-artifacts/compose/compose-lite.yml
      - name: Validate GitHub CI compose config without Ollama
        run: docker compose -f docker-compose.base.yml -f docker-compose-lite.yml -f docker-compose.github-ci.yml config > ci-artifacts/compose/compose-github-ci.yml
      - name: Validate distributed compose config
        run: docker compose -f docker-compose.base.yml -f docker-compose.yml -f docker-compose.distributed.yml config > ci-artifacts/compose/compose-distributed.yml
      - name: Upload compose config artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-compose-configs
          path: ci-artifacts/compose/*.yml
          retention-days: 3

  release-gate:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test-postgres-password
      INITIAL_ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
      AGENT_TOKEN_HUB: hub-token
      AGENT_TOKEN_ALPHA: alpha-token
      AGENT_TOKEN_BETA: beta-token
      AGENT_TOKEN_GAMMA: gamma-token
      AGENT_TOKEN_DELTA: delta-token
      GRAFANA_PASSWORD: test-grafana-password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install domain audit deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Run domain integration audit
        id: domain_audit
        continue-on-error: true
        run: python scripts/audit_domain_integrations.py --out ci-artifacts/domain-runtime/domain-integration-audit-report.json
      - name: Upload domain integration audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-domain-integration-audit
          path: ci-artifacts/domain-runtime/domain-integration-audit-report.json
          retention-days: 14
      - name: Enforce domain integration audit
        if: steps.domain_audit.outcome == 'failure'
        run: exit 1
      - name: Run release reproducibility gate
        run: python scripts/release_gate.py --strict --compose-config --report release-verification-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-release-verification-report
          path: |
            release-verification-report.json
            ci-artifacts/client-surface-release-gate.json
            ci-artifacts/domain-runtime/domain-integration-audit-report.json
          retention-days: 14

  e2e-compose:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test-postgres-password
      INITIAL_ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
      AGENT_TOKEN_HUB: hub-token
      AGENT_TOKEN_ALPHA: alpha-token
      AGENT_TOKEN_BETA: beta-token
      AGENT_TOKEN_GAMMA: gamma-token
      AGENT_TOKEN_DELTA: delta-token
      GRAFANA_PASSWORD: test-grafana-password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build cached backend compose image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.compose-test
          tags: ananta-backend-compose-test:local
          load: true
          cache-from: type=gha,scope=compose-backend
          cache-to: type=gha,scope=compose-backend,mode=max
      - name: Build cached frontend compose image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: frontend-angular
          file: frontend-angular/Dockerfile
          tags: ananta-frontend-compose-test:local
          load: true
          cache-from: type=gha,scope=compose-frontend
          cache-to: type=gha,scope=compose-frontend,mode=max
      - name: Start compose stack
        run: >
          docker compose
          -f docker-compose.base.yml
          -f docker-compose-lite.yml
          -f docker-compose.github-ci.yml
          up -d --no-build
          postgres redis ai-agent-hub ai-agent-alpha ai-agent-beta angular-frontend
      - name: Run E2E against compose
        id: e2e
        continue-on-error: true
        run: >
          docker compose
          -f docker-compose.base.yml
          -f docker-compose-lite.yml
          -f docker-compose.github-ci.yml
          run --rm frontend-test
      - name: Build failure summary
        if: always()
        run: node scripts/e2e-failure-summary.js
        working-directory: frontend-angular
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-e2e-compose-results
          path: |
            frontend-angular/test-results/**
          retention-days: 3
      - name: Stop compose stack
        if: always()
        run: >
          docker compose
          -f docker-compose.base.yml
          -f docker-compose-lite.yml
          -f docker-compose.github-ci.yml
          down -v --remove-orphans
      - name: Fail workflow on E2E failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  todo-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - run: pip install -r requirements.lock
      - run: python devtools/sync_todo_stats.py
      - run: python devtools/validate_todo_schema.py
      - run: git diff --exit-code todo_last.json

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - run: python devtools/check_markdown_links.py

  architecture-diagrams:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
      - run: npm install -g @mermaid-js/mermaid-cli@11.12.0
      - run: mkdir -p architektur/rendered
      - run: |
          for f in architektur/uml/*.mmd; do
            out="architektur/rendered/$(basename "${f%.mmd}.png")"
            mmdc -p architektur/puppeteer-config.json -i "$f" -o "$out" -b transparent
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-architecture-diagrams
          path: architektur/rendered/*.png
          retention-days: 7
