name: Ananta Native Full E2E Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ananta-native-full-e2e-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ananta-native-full-e2e-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EVIDENCE_TOKEN: evidence-agent-token-with-sufficient-length-1234567890
      HUB_URL: http://127.0.0.1:5864
      OUT_DIR_FOR_PY: ci-artifacts/ananta-native-full-e2e-evidence
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run Ananta native full E2E evidence
        run: bash scripts/run_ananta_native_full_e2e_evidence.sh ci-artifacts/ananta-native-full-e2e-evidence
      - name: Print evidence summary
        if: always()
        run: |
          if [ -f ci-artifacts/ananta-native-full-e2e-evidence/evidence-summary.json ]; then
            cat ci-artifacts/ananta-native-full-e2e-evidence/evidence-summary.json
          fi
      - name: Upload Ananta native full E2E evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-native-full-e2e-evidence
          path: ci-artifacts/ananta-native-full-e2e-evidence/**
          if-no-files-found: warn
          retention-days: 14
