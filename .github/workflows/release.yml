name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0-rc.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test-postgres-password
      INITIAL_ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
      AGENT_TOKEN_HUB: hub-token
      AGENT_TOKEN_ALPHA: alpha-token
      AGENT_TOKEN_BETA: beta-token
      AGENT_TOKEN_GAMMA: gamma-token
      AGENT_TOKEN_DELTA: delta-token
      GRAFANA_PASSWORD: test-grafana-password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Run release gate
        run: python scripts/release_gate.py --strict --compose-config --report release-verification-report.json
      - name: Generate release SBOM
        run: python scripts/generate_release_sbom.py
      - name: Prepare release assets
        run: bash scripts/prepare_release_assets.sh
      - name: Upload release asset bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-github-release-assets
          path: release-assets/
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          prerelease_flag=""
          case "$RELEASE_TAG" in
            *-rc*|*-alpha*|*-beta*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$RELEASE_TAG" \
            --title "Ananta ${RELEASE_TAG}" \
            --generate-notes \
            $prerelease_flag
          while IFS= read -r -d '' asset; do
            gh release upload "$RELEASE_TAG" "$asset" --clobber
          done < <(find release-assets -type f -print0)
