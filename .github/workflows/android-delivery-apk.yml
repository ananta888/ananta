name: Android Delivery APK

on:
  push:
    paths:
      - "frontend-angular/**"
      - ".github/workflows/android-delivery-apk.yml"
  pull_request:
    paths:
      - "frontend-angular/**"
      - ".github/workflows/android-delivery-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-delivery-apk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-delivery-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.5"
          cache: "npm"
          cache-dependency-path: frontend-angular/package-lock.json
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Ensure Android SDK platform-35
        run: |
          sdk="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "sdk=$sdk"
          ls "$sdk/platforms/" 2>/dev/null || echo "no platforms dir"
          ls "$sdk/build-tools/" 2>/dev/null || echo "no build-tools dir"
          manager=""
          for candidate in \
            "$sdk/cmdline-tools/latest/bin/sdkmanager" \
            "$sdk/tools/bin/sdkmanager"; do
            [ -x "$candidate" ] && manager="$candidate" && break
          done
          echo "sdkmanager=$manager"
          need_install=0
          [ -d "$sdk/platforms/android-35" ] || need_install=1
          [ -d "$sdk/build-tools/35.0.0" ]  || need_install=1
          if [ "$need_install" = "1" ] && [ -n "$manager" ]; then
            yes | "$manager" --sdk_root="$sdk" "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -10
          fi
          echo "sdk.dir=$sdk" > android/local.properties
      - name: Install frontend dependencies
        run: npm ci
      - name: Prepare CI seed assets
        run: |
          set -euo pipefail
          seed_dir="android/app/src/main/assets/proot-seed"
          mkdir -p "$seed_dir"
          if [ ! -s "$seed_dir/ubuntu-rootfs.tar.xz" ]; then
            tmp_rootfs="$(mktemp -d)"
            mkdir -p "$tmp_rootfs/ubuntu-questing-aarch64"
            printf 'ci-placeholder-rootfs\n' > "$tmp_rootfs/ubuntu-questing-aarch64/.ci-placeholder"
            tar -C "$tmp_rootfs" -cJf "$seed_dir/ubuntu-rootfs.tar.xz" ubuntu-questing-aarch64
            rm -rf "$tmp_rootfs"
          fi
          if [ ! -s "$seed_dir/ananta-workspace.tar.xz" ]; then
            tmp_ws="$(mktemp -d)"
            printf 'ci-placeholder-workspace\n' > "$tmp_ws/README.txt"
            tar -C "$tmp_ws" -cJf "$seed_dir/ananta-workspace.tar.xz" README.txt
            rm -rf "$tmp_ws"
          fi
          [ -s "$seed_dir/ubuntu-rootfs.version" ] || printf 'ci-placeholder-rootfs\n' > "$seed_dir/ubuntu-rootfs.version"
          [ -s "$seed_dir/ananta-workspace.version" ] || printf 'ci-placeholder-workspace\n' > "$seed_dir/ananta-workspace.version"
      - name: Build Angular + Capacitor sync
        run: npm run android:prepare
      - name: Gradle assemble debug APK
        run: |
          set -euo pipefail
          cd android
          ./gradlew --no-daemon \
            -PanantaEnablePythonRuntime=false \
            -PanantaEnableLlamaCppRuntime=false \
            :app:assembleDebug
      - name: Verify and rename APK
        run: |
          set -euo pipefail
          src="android/app/build/outputs/apk/debug/app-debug.apk"
          out="android/app/build/outputs/apk/debug/ananta-delivery-proot-voxtral-debug.apk"
          cp "$src" "$out"
          unzip -l "$out" | grep 'assets/proot-seed/'
          unzip -l "$out" | grep 'assets/voxtral-runner/voxtral-realtime'
      - name: Generate APK checksum
        run: sha256sum android/app/build/outputs/apk/debug/ananta-delivery-proot-voxtral-debug.apk > android/app/build/outputs/apk/debug/ananta-delivery-proot-voxtral-debug.apk.sha256
      - name: Generate wiki release verification report
        run: |
          cat > android/app/build/outputs/apk/debug/wiki-release-verification-report.json <<'JSON'
          {
            "schema": "wiki_rag2_release_verification.v1",
            "android_apk_built": true,
            "wiki_backend_smoke_tests_required": false,
            "wiki_fixture_smoke_tests_required": false,
            "full_dewiki_validated": false,
            "verification_scope": "fixture_and_medium_slice",
            "note": "Release gate verifies fixture/slice coverage. Full dewiki validation remains an explicit separate evidence item."
          }
          JSON
      - name: Upload delivery APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-delivery-proot-voxtral-debug-apk
          path: |
            frontend-angular/android/app/build/outputs/apk/debug/ananta-delivery-proot-voxtral-debug.apk
            frontend-angular/android/app/build/outputs/apk/debug/ananta-delivery-proot-voxtral-debug.apk.sha256
            frontend-angular/android/app/build/outputs/apk/debug/wiki-release-verification-report.json
          retention-days: 14
