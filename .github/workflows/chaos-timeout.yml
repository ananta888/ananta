name: Chaos And Timeout Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "29 2 * * 6"

permissions:
  contents: read

jobs:
  worker-timeout-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run timeout-focused regression tests
        run: >
          pytest -q
          tests/test_task_endpoints.py -k "timeout or retryable"
          tests/test_doom_loop_service.py
          tests/test_live_terminal_session_service.py -k "timeout or crash"

  race-condition-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run claim and autopilot race regression tests
        run: >
          pytest -q
          tests/test_task_orchestration_api.py -k "claim or lease"
          tests/test_tasks_autopilot.py -k "tick"

  failure-recovery-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run bounded failure-recovery tests
        run: >
          pytest -q
          tests/test_task_execution_reconciliation.py
          tests/test_worker_job_flow.py -k "failed or timeout or retry"
          tests/test_task_orchestration_dependencies.py

