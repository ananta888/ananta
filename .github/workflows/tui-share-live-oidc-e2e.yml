name: TUI Share Live OIDC E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 2"

permissions:
  contents: read

concurrency:
  group: tui-share-live-oidc-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tui-share-live-oidc-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ vars.ANANTA_E2E_GITHUB_ENVIRONMENT || 'e2e-live' }}
    env:
      ANANTA_E2E_LIVE_SHARE: "1"
      ANANTA_TUI_E2E_USE_PUBLIC_OIDC: "true"
      ANANTA_TUI_E2E_OIDC_ISSUER: ${{ vars.ANANTA_TUI_E2E_OIDC_ISSUER || 'https://keycloak.ananta.de/realms/ananta-e2e' }}
      ANANTA_TUI_E2E_OIDC_CLIENT_ID: ${{ vars.ANANTA_TUI_E2E_OIDC_CLIENT_ID || 'ananta-tui' }}
      ANANTA_TUI_E2E_OIDC_USERNAME: ${{ vars.ANANTA_TUI_E2E_OIDC_USERNAME || 'e2e' }}
      ANANTA_TUI_E2E_RENDEZVOUS_URL: ${{ vars.ANANTA_TUI_E2E_RENDEZVOUS_URL || 'https://webrtc.ananta.de' }}
      ANANTA_TUI_E2E_SIGNALING_URL: ${{ vars.ANANTA_TUI_E2E_SIGNALING_URL || 'wss://webrtc.ananta.de/signaling' }}
      ANANTA_TUI_E2E_OIDC_PASSWORD: ${{ secrets.ANANTA_TUI_E2E_OIDC_PASSWORD }}
      ANANTA_TUI_E2E_OIDC_CLIENT_SECRET: ${{ secrets.ANANTA_TUI_E2E_OIDC_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Skip when OIDC secrets are unavailable
        if: env.ANANTA_TUI_E2E_OIDC_PASSWORD == '' || env.ANANTA_TUI_E2E_OIDC_CLIENT_SECRET == ''
        run: |
          echo "Missing ANANTA_TUI_E2E_OIDC_PASSWORD or ANANTA_TUI_E2E_OIDC_CLIENT_SECRET in selected environment."
          echo "Skipping live OIDC TUI E2E."
      - name: Run TUI Share live OIDC E2E
        if: env.ANANTA_TUI_E2E_OIDC_PASSWORD != '' && env.ANANTA_TUI_E2E_OIDC_CLIENT_SECRET != ''
        run: >
          pytest -q -rs
          tests/e2e/test_tui_share_session_live_e2e.py::test_share_session_live_e2e_records_real_pty_flow
      - name: Upload TUI E2E artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-tui-share-live-oidc-e2e-artifacts
          path: |
            artifacts/e2e/**
            /tmp/pytest-of-runner/**
          if-no-files-found: ignore
          retention-days: 7
