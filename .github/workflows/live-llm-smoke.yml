name: Live LLM Smoke

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-llm-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  openai-mini-smoke:
    if: >
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'live-llm') ||
          contains(github.event.pull_request.labels.*.name, 'full-ci')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      RUN_LIVE_LLM_TESTS: "1"
      LIVE_LLM_PROVIDER: "openai"
      LIVE_LLM_MODEL: ${{ vars.LIVE_LLM_MODEL || 'gpt-4o-mini' }}
      LIVE_LLM_TIMEOUT_SEC: "20"
      LIVE_LLM_RETRY_ATTEMPTS: "1"
      LIVE_LLM_MAX_OUTPUT_TOKENS: "16"
      LIVE_LLM_ALLOW_PROVIDER_SKIP: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.15"
      - name: Skip when OpenAI secret is unavailable
        if: env.OPENAI_API_KEY == ''
        run: |
          mkdir -p ci-artifacts/live-llm-smoke
          cat > ci-artifacts/live-llm-smoke/smoke-summary.json <<'JSON'
          {
            "status": "skipped",
            "reason": "OPENAI_API_KEY is not available",
            "provider": "openai"
          }
          JSON
          echo "OPENAI_API_KEY is not available; skipping hosted Live LLM smoke."
      - name: Install backend deps
        if: env.OPENAI_API_KEY != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run one hosted OpenAI smoke request
        if: env.OPENAI_API_KEY != ''
        run: pytest -q tests/test_openai_live_smoke.py -rs
      - name: Upload Live LLM smoke diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ananta-live-llm-smoke-diagnostics
          path: ci-artifacts/live-llm-smoke/**
          if-no-files-found: ignore
