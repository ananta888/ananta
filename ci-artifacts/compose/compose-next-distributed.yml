    extra_hosts:
      - host.docker.internal=host-gateway
    image: ananta-quickstart-no-ollama:local
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/krusty/ananta/project-workspaces
        target: /project-workspaces
        bind: {}
      - type: volume
        source: delta-data
        target: /app/data
        volume: {}
    working_dir: /app
  ai-agent-gamma:
    build:
      context: /home/krusty/ananta
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    command:
      - python
      - -m
      - agent.ai_agent
    depends_on:
      ai-agent-hub:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
    environment:
      AGENT_NAME: ananta-worker-3
      AGENT_URL: http://ai-agent-gamma:5000
      ANANTA_RUNTIME_PROFILE: compose-safe
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      COMMAND_TIMEOUT: "180"
      DATABASE_URL: postgresql://ananta:test-postgres-password@postgres:5432/ananta
      DEFAULT_MODEL: auto
      DEFAULT_PROVIDER: lmstudio
      FLASK_DEBUG: "0"
      HTTP_TIMEOUT: "300"
      HUB_URL: http://ai-agent-hub:5000
      INITIAL_ADMIN_PASSWORD: test123
      INITIAL_ADMIN_USER: admin
      LMSTUDIO_API_MODE: chat
      LMSTUDIO_URL: http://192.168.178.100:1234/v1
      OLLAMA_MODEL: qwen2.5-coder:7b
      OLLAMA_URL: http://ollama:11434/api/generate
      OPENROUTER_API_KEY: PLACEHOLDER_OPENROUTER_API_KEY
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/0
      ROLE: worker
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
    extra_hosts:
      - host.docker.internal=host-gateway
    image: ananta-quickstart-no-ollama:local
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/krusty/ananta/project-workspaces
        target: /project-workspaces
        bind: {}
      - type: volume
        source: gamma-data
        target: /app/data
        volume: {}
    working_dir: /app
  ai-agent-hub:
    build:
      context: /home/krusty/ananta
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    command:
      - python
      - -m
      - agent.ai_agent
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      AGENT_NAME: ananta-hub
      AGENT_URL: http://ai-agent-hub:5000
      ANANTA_RUNTIME_PROFILE: compose-safe
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      AUTH_TEST_ENDPOINTS_ENABLED: "1"
      COMMAND_TIMEOUT: "180"
      DATABASE_URL: postgresql://ananta:test-postgres-password@postgres:5432/ananta
      DEFAULT_MODEL: auto
      DEFAULT_PROVIDER: lmstudio
      FLASK_DEBUG: "0"
      HTTP_TIMEOUT: "300"
      HUB_CAN_BE_WORKER: "0"
      INITIAL_ADMIN_PASSWORD: test123
      INITIAL_ADMIN_USER: admin
      LMSTUDIO_API_MODE: chat
      LMSTUDIO_URL: http://192.168.178.100:1234/v1
      OIDC_ALLOWED_ALGORITHMS: RS256
      OIDC_AUDIENCE: ""
      OIDC_CLIENT_ID: ""
      OIDC_ENABLED: "false"
      OIDC_ISSUER_URL: ""
      OIDC_JWKS_CACHE_SECONDS: "3600"
      OIDC_JWKS_URL: ""
      OLLAMA_MODEL: qwen2.5-coder:7b
      OLLAMA_URL: http://ollama:11434/api/generate
      OPENROUTER_API_KEY: PLACEHOLDER_OPENROUTER_API_KEY
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/0
      ROLE: hub
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
    extra_hosts:
      - host.docker.internal=host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:5000/health?basic=1 || exit 1
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 20s
    image: ananta-quickstart-no-ollama:local
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5000
        published: "5000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/krusty/ananta/project-workspaces
        target: /project-workspaces
        bind: {}
      - type: volume
        source: hub-data
        target: /app/data
        volume: {}
    working_dir: /app
  angular-frontend:
    build:
      context: /home/krusty/ananta
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    command:
      - npx
      - ng
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "4200"
      - --poll
      - "2000"
      - --disable-host-check
    depends_on:
      ai-agent-hub:
        condition: service_healthy
        required: true
    environment:
      E2E_ADMIN_PASSWORD: test123
      E2E_ADMIN_USER: admin
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    extra_hosts:
      - host.docker.internal=host-gateway
    image: ananta-quickstart-no-ollama:local
    networks:
      default: null
    ports:
      - mode: ingress
        target: 4200
        published: "4200"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/krusty/ananta/frontend-angular
        target: /app/frontend-angular
        bind: {}
      - type: volume
        source: frontend-node-modules
        target: /app/frontend-angular/node_modules
        volume: {}
      - type: volume
        source: frontend-angular-cache
        target: /app/frontend-angular/.angular
        volume: {}
    working_dir: /app/frontend-angular
  postgres:
    environment:
      POSTGRES_DB: ananta
      POSTGRES_PASSWORD: test-postgres-password
      POSTGRES_USER: ananta
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ananta
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:16.13@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5432"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      timeout: 5s
      interval: 10s
      retries: 5
    image: redis:7.4.8-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    networks:
      default: null
    ports:
      - mode: ingress
        target: 6379
        published: "6379"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: redis-data
        target: /data
        volume: {}
networks:
  default:
    name: compose-next_default
volumes:
  alpha-data:
    name: compose-next_alpha-data
  beta-data:
    name: compose-next_beta-data
  delta-data:
    name: compose-next_delta-data
  frontend-angular-cache:
    name: compose-next_frontend-angular-cache
  frontend-node-modules:
    name: compose-next_frontend-node-modules
  gamma-data:
    name: compose-next_gamma-data
  hub-data:
    name: compose-next_hub-data
  postgres-data:
    name: compose-next_postgres-data
  redis-data:
    name: compose-next_redis-data
