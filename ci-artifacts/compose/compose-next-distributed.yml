name: compose-next
services:
  ai-agent-alpha:
    build:
      context: /home/krusty/ananta
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    command:
      - python
      - -m
      - agent.ai_agent
    depends_on:
      ai-agent-hub:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
    environment:
      AGENT_NAME: ananta-worker-1
      AGENT_URL: http://ai-agent-alpha:5000
      ANANTA_RUNTIME_PROFILE: compose-safe
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      COMMAND_TIMEOUT: "180"
      DATABASE_URL: postgresql://ananta:test-postgres-password@postgres:5432/ananta
      DEFAULT_MODEL: auto
      DEFAULT_PROVIDER: lmstudio
      FLASK_DEBUG: "0"
      HTTP_TIMEOUT: "300"
      HUB_URL: http://ai-agent-hub:5000
      INITIAL_ADMIN_PASSWORD: test123
      INITIAL_ADMIN_USER: admin
      LMSTUDIO_API_MODE: chat
      LMSTUDIO_URL: http://192.168.178.100:1234/v1
      OLLAMA_MODEL: qwen2.5-coder:7b
      OLLAMA_URL: http://ollama:11434/api/generate
      OPENROUTER_API_KEY: PLACEHOLDER_OPENROUTER_API_KEY
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/0
      ROLE: worker
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
    extra_hosts:
      - host.docker.internal=host-gateway
    image: ananta-quickstart-no-ollama:local
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/krusty/ananta/project-workspaces
        target: /project-workspaces
        bind: {}
      - type: volume
        source: alpha-data
        target: /app/data
        volume: {}
    working_dir: /app
  ai-agent-beta:
    build:
      context: /home/krusty/ananta
      dockerfile: docker/compose-next/Dockerfile.quickstart-no-ollama
    command:
      - python
      - -m
      - agent.ai_agent
    depends_on:
      ai-agent-hub:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
    environment:
      AGENT_NAME: ananta-worker-2
      AGENT_URL: http://ai-agent-beta:5000
      ANANTA_RUNTIME_PROFILE: compose-safe
      ANANTA_WORKSPACE_ROOT: /project-workspaces
      COMMAND_TIMEOUT: "180"
      DATABASE_URL: postgresql://ananta:test-postgres-password@postgres:5432/ananta
      DEFAULT_MODEL: auto
      DEFAULT_PROVIDER: lmstudio
      FLASK_DEBUG: "0"
      HTTP_TIMEOUT: "300"
      HUB_URL: http://ai-agent-hub:5000
      INITIAL_ADMIN_PASSWORD: test123
      INITIAL_ADMIN_USER: admin
      LMSTUDIO_API_MODE: chat
      LMSTUDIO_URL: http://192.168.178.100:1234/v1
      OLLAMA_MODEL: qwen2.5-coder:7b
      OLLAMA_URL: http://ollama:11434/api/generate
      OPENROUTER_API_KEY: PLACEHOLDER_OPENROUTER_API_KEY
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/0
      ROLE: worker
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-chars
    extra_hosts:
      - host.docker.internal=host-gateway
    image: ananta-quickstart-no-ollama:local
    networks:
